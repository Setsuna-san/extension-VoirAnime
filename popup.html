<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>My VoirAnime list</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <p class="title" style="color: rgb(176, 176, 176)">
        My <span style="color: #7289da">voir</span
        ><span style="color: whitesmoke">Anime</span> list
      </p>
      <div class="conteneur-switch">
        <a id="btn-switch-1" class="btn-switch" href="#">En cours</a>
        <a id="btn-switch-2" class="btn-switch" href="#">Watch list</a>
      </div>

      <!-- conteneur watching list -->
      <div id="anime-conteneur">
        <!-- <h1 style="text-align: center; margin: 0">Animé(s) en cours</h1> -->

        <!-- container vide pour insérer dynamiquement les animés principaux -->
        <div class="content" id="anime-list">
          <!-- Les AnimeOverlay seront ajoutés ici via JS -->
        </div>

        <!-- bouton voir plus pour afficher les animés secondaires -->
        <a href="#" id="hidden-btn">
          voir plus

          <svg
            fill="currentColor"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 640 640"
          >
            <path
              d="M297.4 438.6C309.9 451.1 330.2 451.1 342.7 438.6L502.7 278.6C515.2 266.1 515.2 245.8 502.7 233.3C490.2 220.8 469.9 220.8 457.4 233.3L320 370.7L182.6 233.4C170.1 220.9 149.8 220.9 137.3 233.4C124.8 245.9 124.8 266.2 137.3 278.7L297.3 438.7z"
            />
          </svg>
        </a>

        <!-- container vide pour insérer dynamiquement les animés commencé mais pas en cours -->
        <div class="content" id="hidden-anime-list">
          <!-- Les AnimeOverlay seront ajoutés ici via JS -->
        </div>
      </div>

      <!-- conteneur to watch list -->
      <div id="watch-conteneur">
        <!-- <h1 style="text-align: center; margin: 0">Watch list</h1> -->

        <!-- container vide pour insérer dynamiquement les animés principaux -->
        <div class="content" id="watch-list">
          <!-- Les AnimeOverlay seront ajoutés ici via JS -->
        </div>
      </div>

      <div class="btn-line">
        <a id="btn-redirect" href="#">Aller à la liste</a>
        <a id="btn-disable" class="disabled" href="#">Déasactiver</a>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
